<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    
    <title>Deskivo - Novo Cliente</title>

    <style>
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="window.electronAPI.goHome()" style="cursor: pointer;">
                <i class="bi bi-kanban me-2"></i>Deskivo
            </a>
            <div class="text-light">
                <i class="bi bi-people fs-5"></i>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 800px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 mb-0 text-secondary">
                <i class="bi bi-person-lines-fill me-2"></i>Cadastro de Cliente
            </h2>
            <div>
                <button onclick="window.electronAPI.goHome()" class="btn btn-outline-secondary me-2 shadow-sm">
                    <i class="bi bi-house me-1"></i>Home
                </button>
                <button onclick="window.electronAPI.openPage('listacliente.html')" class="btn btn-outline-success shadow-sm">
                    <i class="bi bi-list-ul me-1"></i>Lista de Clientes
                </button>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                
                <div class="mb-4">
                    <label for="name" class="form-label fw-semibold">Nome Completo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="name" placeholder="Nome do cliente">
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <label for="cpf" class="form-label fw-semibold">CPF</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-card-text"></i></span>
                            <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00">
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="rg" class="form-label fw-semibold">RG</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-person-vcard"></i></span>
                            <input type="text" class="form-control" id="rg" placeholder="Número do RG">
                        </div>
                    </div>
                </div>

                <hr class="my-4">

                <button id="save-button" class="btn btn-success w-100 py-2 fs-5 shadow-sm">
                    <i class="bi bi-check-circle me-2"></i>Salvar Cliente
                </button>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="cliente.js"></script>
</body>

</html>
