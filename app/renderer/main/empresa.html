<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.css" integrity="sha512-/j+6zx45kh/MDjnlYQL0wjxn+aPaSkaoTczyOGfw64OB2CHR7Uh5v1AML7VUybUnUTscY5ck/gbGygWYcpCA7w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <title>Deskivo - Nova Empresa</title>

    <style>
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="window.electronAPI.goHome()" style="cursor: pointer;">
                <i class="bi bi-kanban me-2"></i>Deskivo
            </a>
            <div class="text-light">
                <i class="bi bi-building fs-5"></i>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 800px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 mb-0 text-secondary">
                <i class="bi bi-building-add me-2"></i>Cadastro de Empresa
            </h2>
            <div>
                <button onclick="window.electronAPI.goHome()" class="btn btn-outline-secondary me-2 shadow-sm">
                    <i class="bi bi-house me-1"></i>Home
                </button>
                <button onclick="window.electronAPI.openPage('listaempresa.html')" class="btn btn-outline-dark shadow-sm">
                    <i class="bi bi-list-ul me-1"></i>Lista de Empresas
                </button>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                
                <div class="mb-3">
                    <label for="razaoSocial" class="form-label fw-semibold">Razão Social</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-building"></i></span>
                        <input type="text" class="form-control" id="razaoSocial" placeholder="Nome oficial da empresa">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="nomeFantasia" class="form-label fw-semibold">Nome Fantasia</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-shop"></i></span>
                        <input type="text" class="form-control" id="nomeFantasia" placeholder="Nome comercial da empresa">
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <label for="cnpj" class="form-label fw-semibold">CNPJ</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-file-earmark-text"></i></span>
                            <input type="text" class="form-control" id="cnpj" placeholder="00.000.000/0000-00">
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="ie" class="form-label fw-semibold">Inscrição Estadual (IE)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-123"></i></span>
                            <input type="text" class="form-control" id="ie" placeholder="Número da IE">
                        </div>
                    </div>
                </div>

                <hr class="my-4">

                <button id="save-button" class="btn btn-success w-100 py-2 fs-5 shadow-sm">
                    <i class="bi bi-check-circle me-2"></i>Salvar Empresa
                </button>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.js" integrity="sha512-pnPZhx5S+z5FSVwy62gcyG2Mun8h6R+PG01MidzU+NGF06/ytcm2r6+AaWMBXAnDHsdHWtsxS0dH8FBKA84FlQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="empresa.js"></script>
</body>

</html>
