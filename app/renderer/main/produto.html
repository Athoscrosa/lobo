<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    
    <title>Deskivo - Novo Produto</title>

    <style>
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="window.electronAPI.goHome()" style="cursor: pointer;">
                <i class="bi bi-kanban me-2"></i>Deskivo
            </a>
            <div class="text-light">
                <i class="bi bi-box-seam fs-5"></i>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 800px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 mb-0 text-secondary">
                <i class="bi bi-plus-square me-2"></i>Cadastro de Produto
            </h2>
            <div>
                <button onclick="window.electronAPI.goHome()" class="btn btn-outline-secondary me-2 shadow-sm">
                    <i class="bi bi-house me-1"></i>Home
                </button>
                <button onclick="window.electronAPI.openPage('listaproduto.html')" class="btn btn-outline-primary shadow-sm">
                    <i class="bi bi-list-ul me-1"></i>Lista de produtos
                </button>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">Nome do Produto</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-box"></i></span>
                        <input type="text" class="form-control" id="name" placeholder="Ex: Nome do produto">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="price" class="form-label fw-semibold">Valor do Produto</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-currency-dollar"></i></span>
                        <input type="text" class="form-control" id="price" placeholder="Ex: 150.00">
                    </div>
                </div>

                <hr class="my-4">

                <button id="save-button" class="btn btn-success w-100 py-2 fs-5 shadow-sm">
                    <i class="bi bi-check-circle me-2"></i>Salvar Produto
                </button>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="produto.js"></script>
</body>

</html>
